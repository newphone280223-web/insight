<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0f5ff 0%, #e6f0fa 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #1e2b4f;
            line-height: 1.6;
        }

        /* White & Blue Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px 48px 32px 32px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 40, 100, 0.25), 
                        inset 0 1px 2px rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(70, 130, 200, 0.2);
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #cbd5e1;
        }

        .title-section h1 {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #2563eb, #1e3a8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .title-section .subtitle {
            font-size: 1.1rem;
            color: #4b5563;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .blue-badge {
            background: #dbeafe;
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e3a8a;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid #bfdbfe;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: 2px solid #d1d9e8;
            border-radius: 40px;
            font-size: 1rem;
            background: white;
            transition: all 0.3s ease;
            color: #1e2b4f;
        }

        .search-box input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            color: #2563eb;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 12px 24px;
            border: 2px solid #d1d9e8;
            border-radius: 40px;
            background: white;
            cursor: pointer;
            font-weight: 500;
            color: #1e2b4f;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-btn:hover, .filter-btn.active {
            background: #2563eb;
            border-color: #2563eb;
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .add-video-btn {
            padding: 12px 28px;
            background: linear-gradient(135deg, #2563eb, #1e3a8a);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
            box-shadow: 0 8px 15px rgba(37, 99, 235, 0.3);
        }

        .add-video-btn:hover {
            background: linear-gradient(135deg, #1e4fcf, #153b7a);
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(37, 99, 235, 0.4);
        }

        /* Stats */
        .stats {
            display: flex;
            gap: 25px;
            margin-bottom: 25px;
            color: #4b5563;
            font-size: 0.95rem;
            background: #f8fafc;
            padding: 12px 20px;
            border-radius: 40px;
            width: fit-content;
            border: 1px solid #d1d9e8;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Video grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        /* Video card */
        .video-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
            animation: fadeIn 0.5s ease;
            cursor: pointer;
        }

        .video-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px -8px rgba(37, 99, 235, 0.3);
            border-color: #2563eb;
        }

        .video-card.expanded {
            grid-column: span 2;
            grid-row: span 1;
            transform: scale(1.02);
            box-shadow: 0 30px 40px -12px #2563eb;
            border: 2px solid #2563eb;
            z-index: 10;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .youtube {
            background-color: #000;
            position: relative;
            padding-top: 56.25%;
            overflow: hidden;
            cursor: pointer;
            border-radius: 20px 20px 0 0;
        }

        .youtube img {
            width: 100%;
            top: -16.84%;
            left: 0;
            opacity: 0.9;
            position: absolute;
            transition: opacity 0.3s ease;
        }

        .video-card:hover .youtube img {
            opacity: 1;
        }

        .youtube .play-button {
            width: 60px;
            height: 45px;
            background: linear-gradient(135deg, #2563eb, #1e3a8a);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.4);
            z-index: 2;
            opacity: 0.9;
            border-radius: 12px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate3d(-50%, -50%, 0);
            transition: all 0.2s ease;
        }

        .youtube:hover .play-button {
            transform: translate3d(-50%, -50%, 0) scale(1.1);
            opacity: 1;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }

        .youtube .play-button:before {
            content: "";
            border-style: solid;
            border-width: 10px 0 10px 18px;
            border-color: transparent transparent transparent #fff;
            position: absolute;
            top: 50%;
            left: 55%;
            transform: translate3d(-50%, -50%, 0);
        }

        .youtube iframe {
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .video-info {
            padding: 16px;
            background: white;
        }

        .video-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1e2b4f;
            line-height: 1.4;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .video-title .duration {
            font-size: 0.85rem;
            color: #2563eb;
            background: #dbeafe;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: 500;
        }

        .video-meta {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
            font-size: 0.8rem;
            color: #6b7280;
        }

        .video-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .progress-bar {
            height: 4px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #3b82f6);
            width: 0%;
            border-radius: 10px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 40px;
            padding: 35px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(37, 99, 235, 0.3);
            border: 1px solid #bfdbfe;
        }

        .modal-content h2 {
            color: #1e3a8a;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .modal-content input,
        .modal-content select,
        .modal-content textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #d1d9e8;
            border-radius: 20px;
            font-size: 1rem;
            background: white;
            color: #1e2b4f;
        }

        .modal-content input:focus,
        .modal-content select:focus,
        .modal-content textarea:focus {
            outline: none;
            border-color: #2563eb;
        }

        .modal-content textarea {
            height: 100px;
            resize: vertical;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-buttons button {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .save-btn {
            background: #2563eb;
            color: white;
        }

        .cancel-btn {
            background: #e2e8f0;
            color: #1e2b4f;
        }

        .save-btn:hover, .cancel-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.2);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .empty-state p {
            font-size: 1.2rem;
            margin: 15px 0;
        }

        /* Footer */
        .footer {
            margin-top: 50px;
            text-align: center;
            color: #6b7280;
            font-size: 0.9rem;
            padding-top: 20px;
            border-top: 1px dashed #cbd5e1;
        }

        .footer span {
            color: #2563eb;
        }
    </style>
</head>

            lectures.forEach(lecture => {
                const [mins, secs] = lecture.duration.split(':').map(Number);
                totalMinutes += mins + (secs/60);
            });
            return Math.round(totalMinutes / 60);

                            ${lecture.notes ? '<span>📝 Notes</span>' : ''}
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${lecture.watched ? '100' : '0'}%"></div>
                        </div>
                    </div>
                </div>
            `).join('');

            updateStats();
        }

        function handleCardClick(event, id) {
            // Don't expand if clicking on play button or iframe
            if (event.target.closest('.youtube') || event.target.closest('iframe')) {
                return;
            }
            
            // Toggle expansion
            if (expandedCardId === id) {
                expandedCardId = null;
            } else {
                expandedCardId = id;
            }
            displayVideos();
            
            // Scroll to expanded card
            if (expandedCardId) {
                setTimeout(() => {
                    const expandedCard = document.querySelector(`.video-card[data-id="${id}"]`);
                    if (expandedCard) {
                        expandedCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }, 100);
            }
        }

        function playVideo(container, id) {
            const embedId = container.dataset.embed;
            
            // Mark as watched
            const lecture = lectures.find(l => l.id === id);
            if (lecture) {
                lecture.watched = true;
            }
            
            const iframe = document.createElement('iframe');
            iframe.setAttribute('frameborder', '0');
            iframe.setAttribute('allowfullscreen', '');
            iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture');
            iframe.setAttribute('src', `https://www.youtube.com/embed/${embedId}?autoplay=1&rel=0&modestbranding=1`);
            container.innerHTML = '';
            container.appendChild(iframe);
            
            updateStats();
        }

        function getSubjectIcon(subject) {
            const icons = {
                physics: '⚛️',
                chemistry: '🧪',
                maths: '📐'
            };
            return icons[subject] || '📚';
        }

        function updateStats() {
            document.getElementById('totalVideos').textContent = lectures.length;
            
            const totalHours = calculateTotalHours();
            document.getElementById('totalHours').textContent = totalHours;
            
            const watchedCount = lectures.filter(l => l.watched).length;
            const completion = lectures.length ? Math.round((watchedCount / lectures.length) * 100) : 0;
            document.getElementById('completionRate').textContent = completion;
            
            // Update filter button counts
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const filter = btn.dataset.filter;
                if (filter === 'all') {
                    btn.innerHTML = `<span>📋</span> All <span style="font-size:0.8rem; color:#2563eb;">(${lectures.length})</span>`;
                } else {
                    const count = lectures.filter(l => l.subject === filter).length;
                    const icon = getSubjectIcon(filter);
                    btn.innerHTML = `${btn.innerHTML.split('<span>')[0]}<span>${icon}</span> ${filter.charAt(0).toUpperCase() + filter.slice(1)} <span style="font-size:0.8rem; color:#2563eb;">(${count})</span>`;
                }
            });
        }

        // Search
        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            expandedCardId = null; // Collapse expanded card when searching
            displayVideos();
        });

        // Filter
        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                expandedCardId = null; // Collapse expanded card when filtering
                displayVideos();
            });
        });

        // Modal functions
        function openModal() {
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
            document.getElementById('videoUrl').value = '';
            document.getElementById('videoTitle').value = '';
            document.getElementById('videoNotes').value = '';
        }

        function addVideo() {
            const url = document.getElementById('videoUrl').value;
            const title = document.getElementById('videoTitle').value;
            const subject = document.getElementById('videoSubject').value;
            const notes = document.getElementById('videoNotes').value;

            let videoId = url;
            if (url.includes('youtube.com/watch?v=')) {
                videoId = url.split('v=')[1]?.split('&')[0];
            } else if (url.includes('youtu.be/')) {
                videoId = url.split('youtu.be/')[1]?.split('?')[0];
            }

            if (videoId && videoId.length === 11) {
                lectures.push({
                    id: videoId,
                    title: title || 'Untitled Lecture',
                    subject: subject,
                    duration: '—',
                    notes: notes,
                    watched: false
                });
                displayVideos();
                closeModal();
            } else {
                alert('Please enter a valid YouTube URL or 11-character video ID');
            }
        }

        window.addVideo = addVideo;
        window.closeModal = closeModal;
        window.playVideo = playVideo;
        window.handleCardClick = handleCardClick;

        document.getElementById('addVideoBtn').addEventListener('click', openModal);

        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // Initialize
        displayVideos();
    </script>
</body>
</html>
