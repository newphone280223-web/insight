<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 JEE Study Nook • Cozy Lecture Hall</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fbf3e0 0%, #f8e9d0 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #3a2c1b;
            line-height: 1.6;
        }

        /* Cozy container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 250, 240, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 48px 48px 32px 32px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 
                        inset 0 1px 2px rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 245, 220, 0.6);
        }

        /* Header with cozy vibes */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px dashed #d4b48c;
        }

        .title-section h1 {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #5e3c23, #8b5e3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .title-section .subtitle {
            font-size: 1.1rem;
            color: #7a5a3a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cozy-badge {
            background: #e6d5b8;
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #5e3c23;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid #f0e0c0;
        }

        /* Controls bar */
        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: 2px solid #e6d5b8;
            border-radius: 40px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
            color: #3a2c1b;
        }

        .search-box input:focus {
            outline: none;
            border-color: #b88b4a;
            box-shadow: 0 0 0 4px rgba(184, 139, 74, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            color: #b88b4a;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 12px 24px;
            border: 2px solid #e6d5b8;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            font-weight: 500;
            color: #5e3c23;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-btn:hover, .filter-btn.active {
            background: #b88b4a;
            border-color: #b88b4a;
            color: white;
        }

        .add-video-btn {
            padding: 12px 28px;
            background: #5e3c23;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
            box-shadow: 0 8px 15px rgba(94, 60, 35, 0.2);
        }

        .add-video-btn:hover {
            background: #7a4f2e;
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(94, 60, 35, 0.3);
        }

        /* Stats bar */
        .stats {
            display: flex;
            gap: 25px;
            margin-bottom: 25px;
            color: #7a5a3a;
            font-size: 0.95rem;
            background: #f4e8d8;
            padding: 12px 20px;
            border-radius: 40px;
            width: fit-content;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Video grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        /* Video card */
        .video-card {
            background: #fffcf5;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 15px 30px -10px rgba(94, 60, 35, 0.15);
            transition: all 0.3s ease;
            border: 1px solid #f0e0d0;
            animation: fadeIn 0.5s ease;
        }

        .video-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 40px -12px #5e3c23;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .youtube {
            background-color: #1a1a1a;
            position: relative;
            padding-top: 56.25%;
            overflow: hidden;
            cursor: pointer;
            border-radius: 20px 20px 0 0;
        }

        .youtube img {
            width: 100%;
            top: -16.84%;
            left: 0;
            opacity: 0.8;
            position: absolute;
            transition: opacity 0.3s ease;
        }

        .video-card:hover .youtube img {
            opacity: 1;
        }

        .youtube .play-button {
            width: 70px;
            height: 50px;
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            box-shadow: 0 10px 25px rgba(255, 71, 87, 0.4);
            z-index: 2;
            opacity: 0.9;
            border-radius: 12px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate3d(-50%, -50%, 0);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .youtube:hover .play-button {
            transform: translate3d(-50%, -50%, 0) scale(1.1);
            opacity: 1;
            background: linear-gradient(135deg, #ff4757, #ff6b6b);
        }

        .youtube .play-button:before {
            content: "";
            border-style: solid;
            border-width: 12px 0 12px 20px;
            border-color: transparent transparent transparent #fff;
            position: absolute;
            top: 50%;
            left: 55%;
            transform: translate3d(-50%, -50%, 0);
        }

        .youtube iframe {
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .video-info {
            padding: 20px;
        }

        .video-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #3a2c1b;
            line-height: 1.4;
        }

        .video-meta {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #8b7a60;
        }

        .video-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .video-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .tag {
            background: #f0e6d8;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #5e3c23;
        }

        .progress-bar {
            height: 6px;
            background: #e6d5b8;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #b88b4a, #d4a05e);
            width: 0%;
            border-radius: 10px;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .video-card:hover .card-actions {
            opacity: 1;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            font-size: 1.1rem;
            color: #8b7a60;
            transition: color 0.2s ease;
        }

        .action-btn:hover {
            color: #5e3c23;
        }

        /* Add video modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #fffcf5;
            border-radius: 40px;
            padding: 35px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(94, 60, 35, 0.3);
            border: 1px solid #f0e0d0;
        }

        .modal-content h2 {
            color: #5e3c23;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .modal-content input,
        .modal-content select,
        .modal-content textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #e6d5b8;
            border-radius: 20px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.9);
        }

        .modal-content textarea {
            height: 100px;
            resize: vertical;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-buttons button {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .save-btn {
            background: #5e3c23;
            color: white;
        }

        .cancel-btn {
            background: #e6d5b8;
            color: #5e3c23;
        }

        .save-btn:hover, .cancel-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8b7a60;
        }

        .empty-state p {
            font-size: 1.2rem;
            margin: 15px 0;
        }

        /* Footer */
        .footer {
            margin-top: 50px;
            text-align: center;
            color: #8b7a60;
            font-size: 0.9rem;
            padding-top: 20px;
            border-top: 1px dashed #d4b48c;
        }

        .footer span {
            color: #b88b4a;
        }

        /* Loading animation */
        .loading {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #e6d5b8;
            border-top-color: #b88b4a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Cozy Header -->
        <div class="header">
            <div class="title-section">
                <h1>📖 JEE Study Nook</h1>
                <div class="subtitle">
                    <span>☕</span> Your cozy lecture hall • distraction-free zone
                </div>
            </div>
            <div class="cozy-badge">
                <span>📚</span> 5 lectures today
                <span>🎯</span> JEE 2026
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search lectures...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">
                    <span>📋</span> All
                </button>
                <button class="filter-btn" data-filter="physics">
                    <span>⚛️</span> Physics
                </button>
                <button class="filter-btn" data-filter="chemistry">
                    <span>🧪</span> Chemistry
                </button>
                <button class="filter-btn" data-filter="maths">
                    <span>📐</span> Maths
                </button>
            </div>
            <button class="add-video-btn" id="addVideoBtn">
                <span>➕</span> Add Lecture
            </button>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-item">
                <span>📺</span> <span id="totalVideos">0</span> lectures
            </div>
            <div class="stat-item">
                <span>⏱️</span> <span id="totalHours">0</span> hours of content
            </div>
            <div class="stat-item">
                <span>📊</span> <span id="completionRate">0</span>% completed
            </div>
        </div>

        <!-- Video Grid -->
        <div id="videoGrid" class="video-grid"></div>

        <!-- Footer -->
        <div class="footer">
            Made with <span>❤️</span> for JEE aspirants • Study cozy, study smart
        </div>
    </div>

    <!-- Add Video Modal -->
    <div class="modal" id="videoModal">
        <div class="modal-content">
            <h2>➕ Add New Lecture</h2>
            <input type="text" id="videoUrl" placeholder="YouTube URL or Video ID">
            <input type="text" id="videoTitle" placeholder="Lecture title">
            <select id="videoSubject">
                <option value="physics">⚛️ Physics</option>
                <option value="chemistry">🧪 Chemistry</option>
                <option value="maths">📐 Maths</option>
            </select>
            <textarea id="videoNotes" placeholder="Your notes about this lecture..."></textarea>
            <div class="modal-buttons">
                <button class="cancel-btn" onclick="closeModal()">Cancel</button>
                <button class="save-btn" onclick="addVideo()">Save Lecture</button>
            </div>
        </div>
    </div>

    <script>
        // Lecture database
        let lectures = [
            {
                id: 'k5NoAjpuXww',
                title: 'Rotational Motion - Complete Guide',
                subject: 'physics',
                duration: '45:30',
                notes: 'Important for JEE Advanced',
                watched: false
            },
            {
                id: 'dQw4w9WgXcQ',
                title: 'Organic Chemistry Basics',
                subject: 'chemistry',
                duration: '52:15',
                notes: 'Must watch before moving to advanced topics',
                watched: false
            },
            {
                id: 'jNQXAC9IVRw',
                title: 'Calculus - Limits & Continuity',
                subject: 'maths',
                duration: '38:20',
                notes: 'Foundation for differentiation',
                watched: false
            }
        ];

        const videoGrid = document.getElementById('videoGrid');
        const searchInput = document.getElementById('searchInput');
        const filterButtons = document.querySelectorAll('.filter-btn');
        const modal = document.getElementById('videoModal');
        
        let currentFilter = 'all';
        let searchTerm = '';

        // Load and display videos
        function displayVideos() {
            const filtered = lectures.filter(lecture => {
                // Filter by subject
                if (currentFilter !== 'all' && lecture.subject !== currentFilter) return false;
                
                // Filter by search
                if (searchTerm && !lecture.title.toLowerCase().includes(searchTerm.toLowerCase())) return false;
                
                return true;
            });

            if (filtered.length === 0) {
                videoGrid.innerHTML = `
                    <div class="empty-state">
                        <span style="font-size: 3rem;">📚</span>
                        <p>No lectures found</p>
                        <p style="font-size: 0.9rem;">Click "Add Lecture" to start your study session</p>
                    </div>
                `;
                updateStats();
                return;
            }

            videoGrid.innerHTML = filtered.map(lecture => `
                <div class="video-card" data-id="${lecture.id}" data-subject="${lecture.subject}">
                    <div class="youtube" data-embed="${lecture.id}">
                        <img src="https://img.youtube.com/vi/${lecture.id}/sddefault.jpg" alt="Thumbnail">
                        <div class="play-button"></div>
                    </div>
                    <div class="video-info">
                        <h3 class="video-title">${lecture.title}</h3>
                        <div class="video-meta">
                            <span>⏱️ ${lecture.duration || '—'}</span>
                            <span>📺 ${getSubjectIcon(lecture.subject)} ${lecture.subject}</span>
                        </div>
                        <div class="video-tags">
                            ${lecture.notes ? `<span class="tag">📝 Notes saved</span>` : ''}
                            ${lecture.watched ? '<span class="tag">✅ Watched</span>' : '<span class="tag">⏳ New</span>'}
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${lecture.watched ? '100' : '0'}%"></div>
                        </div>
                        <div class="card-actions">
                            <button class="action-btn" onclick="toggleWatched('${lecture.id}')" title="Mark watched">✅</button>
                            <button class="action-btn" onclick="editLecture('${lecture.id}')" title="Edit notes">✏️</button>
                            <button class="action-btn" onclick="deleteLecture('${lecture.id}')" title="Remove">🗑️</button>
                        </div>
                    </div>
                </div>
            `).join('');

            // Add click handlers for video playback
            document.querySelectorAll('.youtube').forEach(container => {
                container.addEventListener('click', function() {
                    playVideo(this);
                });
            });

            updateStats();
        }

        function getSubjectIcon(subject) {
            const icons = {
                physics: '⚛️',
                chemistry: '🧪',
                maths: '📐'
            };
            return icons[subject] || '📚';
        }

        function playVideo(container) {
            const embedId = container.dataset.embed;
            const iframe = document.createElement('iframe');
            iframe.setAttribute('frameborder', '0');
            iframe.setAttribute('allowfullscreen', '');
            iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture');
            iframe.setAttribute('src', `https://www.youtube.com/embed/${embedId}?autoplay=1&rel=0&modestbranding=1`);
            container.innerHTML = '';
            container.appendChild(iframe);
        }

        function updateStats() {
            document.getElementById('totalVideos').textContent = lectures.length;
            
            const watchedCount = lectures.filter(l => l.watched).length;
            const completion = lectures.length ? Math.round((watchedCount / lectures.length) * 100) : 0;
            document.getElementById('completionRate').textContent = completion;
            
            // Update filter badge counts
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const filter = btn.dataset.filter;
                if (filter === 'all') {
                    btn.innerHTML = `<span>📋</span> All <span style="font-size:0.8rem; color:#b88b4a;">(${lectures.length})</span>`;
                } else {
                    const count = lectures.filter(l => l.subject === filter).length;
                    btn.innerHTML = `${btn.innerHTML.split('<span>')[0]}<span>${getSubjectIcon(filter)}</span> ${filter} <span style="font-size:0.8rem; color:#b88b4a;">(${count})</span>`;
                }
            });
        }

        // Search functionality
        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            displayVideos();
        });

        // Filter functionality
        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                displayVideos();
            });
        });

        // Modal functions
        function openModal() {
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
            document.getElementById('videoUrl').value = '';
            document.getElementById('videoTitle').value = '';
            document.getElementById('videoNotes').value = '';
        }

        function addVideo() {
            const url = document.getElementById('videoUrl').value;
            const title = document.getElementById('videoTitle').value;
            const subject = document.getElementById('videoSubject').value;
            const notes = document.getElementById('videoNotes').value;

            // Extract video ID from URL
            let videoId = url;
            if (url.includes('youtube.com/watch?v=')) {
                videoId = url.split('v=')[1]?.split('&')[0];
            } else if (url.includes('youtu.be/')) {
                videoId = url.split('youtu.be/')[1]?.split('?')[0];
            }

            if (videoId && videoId.length === 11) {
                lectures.push({
                    id: videoId,
                    title: title || 'Untitled Lecture',
                    subject: subject,
                    duration: '—',
                    notes: notes,
                    watched: false
                });
                displayVideos();
                closeModal();
            } else {
                alert('Please enter a valid YouTube URL or 11-character video ID');
            }
        }

        window.addVideo = addVideo;
        window.closeModal = closeModal;

        // Video actions
        window.toggleWatched = (id) => {
            const lecture = lectures.find(l => l.id === id);
            if (lecture) {
                lecture.watched = !lecture.watched;
                displayVideos();
            }
        };

        window.editLecture = (id) => {
            const lecture = lectures.find(l => l.id === id);
            if (lecture) {
                document.getElementById('videoUrl').value = lecture.id;
                document.getElementById('videoTitle').value = lecture.title;
                document.getElementById('videoSubject').value = lecture.subject;
                document.getElementById('videoNotes').value = lecture.notes || '';
                openModal();
                
                // Remove old and add as new
                lectures = lectures.filter(l => l.id !== id);
            }
        };

        window.deleteLecture = (id) => {
            if (confirm('Remove this lecture from your list?')) {
                lectures = lectures.filter(l => l.id !== id);
                displayVideos();
            }
        };

        // Event listener for add button
        document.getElementById('addVideoBtn').addEventListener('click', openModal);

        // Close modal when clicking outside
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // Initialize
        displayVideos();
    </script>
</body>
</html>
