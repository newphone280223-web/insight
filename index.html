<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💙 JEE Lecture Series • Google Sheets Powered</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #f0f5ff 0%, #e6f0fa 100%);
            padding: 30px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 48px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 40, 100, 0.25);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #cbd5e1;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #2563eb, #1e3a8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            background: #dbeafe;
            padding: 8px 16px;
            border-radius: 100px;
            color: #1e3a8a;
            font-weight: 500;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: 2px solid #d1d9e8;
            border-radius: 40px;
            font-size: 1rem;
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 12px 24px;
            border: 2px solid #d1d9e8;
            border-radius: 40px;
            background: white;
            cursor: pointer;
            font-weight: 500;
        }

        .filter-btn.active {
            background: #2563eb;
            border-color: #2563eb;
            color: white;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            background: #f8fafc;
            padding: 12px 20px;
            border-radius: 40px;
            width: fit-content;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .video-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
        }

        .video-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px -8px rgba(37, 99, 235, 0.3);
            border-color: #2563eb;
        }

        .thumbnail {
            background-color: #000;
            position: relative;
            padding-top: 56.25%;
            overflow: hidden;
        }

        .thumbnail img {
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .play-button {
            width: 60px;
            height: 45px;
            background: #2563eb;
            border-radius: 12px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.9;
        }

        .play-button:before {
            content: "";
            border-style: solid;
            border-width: 10px 0 10px 18px;
            border-color: transparent transparent transparent white;
            position: absolute;
            top: 50%;
            left: 55%;
            transform: translate(-50%, -50%);
        }

        .video-info {
            padding: 16px;
        }

        .video-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            line-height: 1.4;
        }

        .duration {
            font-size: 0.85rem;
            color: #2563eb;
            background: #dbeafe;
            padding: 4px 8px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .video-meta {
            font-size: 0.85rem;
            color: #4b5563;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .channel-icon {
            font-size: 1rem;
        }

        .channel-name {
            font-weight: 500;
            color: #2563eb;
        }

        .subject-tag {
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            margin-left: auto;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: #2563eb;
        }

        .footer {
            margin-top: 50px;
            text-align: center;
            color: #6b7280;
            padding-top: 20px;
            border-top: 1px dashed #cbd5e1;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            width: 90%;
            max-width: 1000px;
            background: black;
            border-radius: 20px;
            overflow: hidden;
        }

        .video-container {
            position: relative;
            padding-top: 56.25%;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            z-index: 1001;
        }

        .sheets-status {
            background: #0f9d58;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-left: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #6b7280;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💙 JEE Complete Lecture Series</h1>
            <div>
                <span class="badge" id="videoCount">Loading...</span>
                <span class="sheets-status" id="sheetsStatus">📊 Loading from Google Sheets...</span>
            </div>
        </div>

        <div class="controls">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search lectures by title or channel...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">📋 All</button>
                <button class="filter-btn" data-filter="physics">⚛️ Physics</button>
                <button class="filter-btn" data-filter="chemistry">🧪 Chemistry</button>
                <button class="filter-btn" data-filter="maths">📐 Mathematics</button>
            </div>
        </div>

        <div class="stats">
            <span>📺 <span id="totalVideos">0</span> lectures</span>
            <span>⏱️ <span id="totalHours">0</span> hours</span>
            <span>🎥 <span id="totalChannels">0</span> channels</span>
        </div>

        <div id="videoGrid" class="video-grid">
            <div class="loading">Loading videos from Google Sheets...</div>
        </div>

        <div class="footer">
            Made with <span>💙</span> for JEE aspirants • Data updates automatically from Google Sheets
        </div>
    </div>

    <!-- Video Player Modal -->
    <div class="modal" id="videoModal">
        <span class="close-modal" onclick="closeVideoModal()">&times;</span>
        <div class="modal-content">
            <div class="video-container">
                <iframe id="youtubePlayer" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        // 🔥 YOUR GOOGLE SHEETS CSV URL
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTOtCn2wNDwJahM8yPjAKnDfaB3DDHoNHOxylyq9mtC6nN59y4ES07jd2MFjmqYm9ml750slTZc_JAh/pub?output=csv";

        // Global variables
        let allVideos = [];
        let currentFilter = 'all';
        let searchTerm = '';

        const videoGrid = document.getElementById('videoGrid');
        const searchInput = document.getElementById('searchInput');
        const filterButtons = document.querySelectorAll('.filter-btn');
        const videoModal = document.getElementById('videoModal');
        const youtubePlayer = document.getElementById('youtubePlayer');
        const sheetsStatus = document.getElementById('sheetsStatus');

        // Load videos from Google Sheets
        async function loadVideos() {
            try {
                sheetsStatus.textContent = '📊 Fetching from Sheets...';
                
                const response = await fetch(SHEET_URL);
                const csvText = await response.text();
                
                // Parse CSV
                const rows = csvText.split('\n').map(row => 
                    row.split(',').map(cell => cell.replace(/^"|"$/g, '').trim())
                );
                
                // First row is headers
                const headers = rows[0];
                console.log("Headers:", headers);
                
                // Convert to objects - MATCHING YOUR COLUMN ORDER:
                // id, title, channel, duration, order, subject
                allVideos = rows.slice(1).map((row, index) => {
                    if (row.length < 6) return null; // Need all 6 columns
                    
                    return {
                        id: row[0],              // Column A: id
                        title: row[1],            // Column B: title
                        channel: row[2],           // Column C: channel
                        duration: row[3],          // Column D: duration
                        order: parseInt(row[4]) || index + 1,  // Column E: order
                        subject: (row[5] || '').toLowerCase()  // Column F: subject
                    };
                }).filter(v => v && v.id); // Remove null entries
                
                // Sort by order
                allVideos.sort((a, b) => a.order - b.order);
                
                console.log(`✅ Loaded ${allVideos.length} videos from Google Sheets`);
                console.log(`✅ Found ${getUniqueChannels().length} unique channels`);
                
                sheetsStatus.textContent = `✅ Live from Google Sheets (${allVideos.length} videos)`;
                
                displayVideos();
                updateStats();
                
            } catch (error) {
                console.error('Error loading from Sheets:', error);
                videoGrid.innerHTML = `<div class="empty-state">❌ Error loading from Google Sheets: ${error.message}</div>`;
                sheetsStatus.textContent = '❌ Connection failed';
            }
        }

        function getUniqueChannels() {
            const channels = new Set();
            allVideos.forEach(video => {
                if (video.channel) channels.add(video.channel);
            });
            return Array.from(channels);
        }

        function formatDuration(duration) {
            // Handle different duration formats
            if (!duration) return "?";
            
            // If it's already in MM:SS or HH:MM:SS format
            if (duration.includes(':')) {
                return duration;
            }
            
            // If it's a number (seconds)
            if (!isNaN(duration)) {
                const seconds = parseInt(duration);
                const hours = Math.floor(seconds / 3600);
                const minutes = Math.floor((seconds % 3600) / 60);
                const secs = seconds % 60;
                
                if (hours > 0) {
                    return `${hours}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                } else {
                    return `${minutes}:${secs.toString().padStart(2, '0')}`;
                }
            }
            
            return duration;
        }

        function displayVideos() {
            let videosToShow = allVideos.filter(video => {
                // Filter by subject
                if (currentFilter !== 'all' && video.subject !== currentFilter) return false;
                
                // Search in both title AND channel name
                if (searchTerm) {
                    const term = searchTerm.toLowerCase();
                    const titleMatch = video.title.toLowerCase().includes(term);
                    const channelMatch = video.channel ? video.channel.toLowerCase().includes(term) : false;
                    return titleMatch || channelMatch;
                }
                
                return true;
            });

            if (videosToShow.length === 0) {
                videoGrid.innerHTML = '<div class="empty-state">No matching videos found</div>';
                return;
            }

            videoGrid.innerHTML = videosToShow.map(video => `
                <div class="video-card" onclick="playVideo('${video.id}')">
                    <div class="thumbnail">
                        <img src="https://img.youtube.com/vi/${video.id}/sddefault.jpg" 
                             alt="${video.title}"
                             onerror="this.src='https://img.youtube.com/vi/${video.id}/hqdefault.jpg'">
                        <div class="play-button"></div>
                    </div>
                    <div class="video-info">
                        <div class="video-title">
                            ${video.title}
                            <span class="duration">${formatDuration(video.duration)}</span>
                        </div>
                        <div class="video-meta">
                            <span class="channel-icon">📺</span>
                            <span class="channel-name" title="${video.channel}">${video.channel || 'Unknown Channel'}</span>
                            <span class="subject-tag">${video.subject}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function playVideo(videoId) {
            youtubePlayer.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1`;
            videoModal.classList.add('active');
        }

        function closeVideoModal() {
            videoModal.classList.remove('active');
            youtubePlayer.src = '';
        }

        function updateStats() {
            document.getElementById('videoCount').textContent = `${allVideos.length} lectures`;
            document.getElementById('totalVideos').textContent = allVideos.length;
            
            // Calculate total hours
            let totalMinutes = 0;
            allVideos.forEach(video => {
                if (video.duration) {
                    const duration = video.duration.toString();
                    if (duration.includes(':')) {
                        const parts = duration.split(':');
                        if (parts.length === 2) {
                            totalMinutes += parseInt(parts[0]) * 60 + parseInt(parts[1]);
                        } else if (parts.length === 3) {
                            totalMinutes += parseInt(parts[0]) * 3600 + parseInt(parts[1]) * 60 + parseInt(parts[2]);
                        }
                    } else if (!isNaN(duration)) {
                        totalMinutes += parseInt(duration) / 60;
                    }
                }
            });
            document.getElementById('totalHours').textContent = Math.round(totalMinutes / 60);
            
            // Show total channels
            document.getElementById('totalChannels').textContent = getUniqueChannels().length;
        }

        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            displayVideos();
        });

        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                displayVideos();
            });
        });

        // Close modal when clicking outside
        window.addEventListener('click', (e) => {
            if (e.target === videoModal) {
                closeVideoModal();
            }
        });

        // Keyboard shortcut: ESC to close modal
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && videoModal.classList.contains('active')) {
                closeVideoModal();
            }
        });

        window.playVideo = playVideo;
        window.closeVideoModal = closeVideoModal;

        // Start loading
        loadVideos();
    </script>
</body>
</html>
